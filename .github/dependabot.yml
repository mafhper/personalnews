version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-root-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/quality-core/dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-dashboard-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
