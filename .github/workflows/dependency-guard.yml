name: Dependency Guard

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "bun.lock"
      - "quality-core/dashboard/package.json"
      - "quality-core/dashboard/package-lock.json"
      - "quality-core/dashboard/bun.lockb"
      - ".github/dependabot.yml"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            quality-core/dashboard/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install root npm dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Verify root npm registry signatures
        run: npm audit signatures

      - name: Audit root known vulnerabilities
        run: npm audit --audit-level=high

      - name: Install dashboard npm dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
        working-directory: quality-core/dashboard

      - name: Verify dashboard npm registry signatures
        run: npm audit signatures
        working-directory: quality-core/dashboard

      - name: Audit dashboard known vulnerabilities
        run: npm audit --audit-level=high
        working-directory: quality-core/dashboard

      - name: Check root Bun lockfile
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Check dashboard Bun lockfile
        run: bun install --frozen-lockfile --ignore-scripts
        working-directory: quality-core/dashboard

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
