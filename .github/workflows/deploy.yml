name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --no-cache

      - name: Type check
        run: bun tsc --noEmit -p tsconfig.json

      - name: Run core tests
        run: |
          echo "START: Running Core Tests"
          bun run test
          echo "END: Core Tests Completed"

      - name: Run security scan
        run: |
          echo "START: Running Security Scan"
          bun run security:scan
          echo "END: Security Scan Completed"

      - name: Clean dist
        run: rm -rf dist

      - name: Build project
        run: bun vite build

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
