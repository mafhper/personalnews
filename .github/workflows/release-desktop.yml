# Desktop installers + GitHub Release are created only when a version tag is pushed
# (e.g. git tag -a v1.1.3 -m "Release v1.1.3" && git push origin v1.1.3).
# Pushes to main update GitHub Pages but do not create a new Release.
name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis,msi
          - os: ubuntu-22.04
            bundles: deb,appimage
          - os: macos-latest
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: install bun
        uses: oven-sh/setup-bun@v2

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install Linux bundling dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: bun install

      - name: prepare backend
        run: node scripts/prepare-backend.mjs

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          TAURI_VERBOSE: 1
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__ # tauri-action will replace this
          releaseName: "Personal News v__VERSION__"
          releaseBody: "Automated release of Personal News desktop version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: "--bundles ${{ matrix.bundles }} --verbose"
