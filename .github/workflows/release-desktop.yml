# Desktop installers + GitHub Release are created only when a version tag is pushed
# (e.g. git tag -a v1.1.3 -m "Release v1.1.3" && git push origin v1.1.3).
# Pushes to main update GitHub Pages but do not create a new Release.
name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis,msi
          - os: ubuntu-22.04
            bundles: deb
          - os: macos-latest
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: install Linux bundling dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: prepare backend
        run: node scripts/prepare-backend.mjs

      - name: Validate installer assets
        if: runner.os == 'Windows'
        run: bun run desktop:installer-assets:check

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_VERBOSE: 1
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__ # tauri-action will replace this
          releaseName: "Personal News v__VERSION__"
          releaseBody: |
            <p align="center">
              <img src="https://raw.githubusercontent.com/mafhper/personalnews/main/public/og-image.png" alt="PersonalNews" width="960">
            </p>

            PersonalNews reúne seus feeds, podcasts e vídeos em uma experiência de leitura local e personalizável.

            ## Instalação

            | Sistema | Arquivo recomendado | Uso |
            | --- | --- | --- |
            | Windows | `PersonalNews_*_x64-setup.exe` | Instalação comum, sem exigir privilégios de administrador |
            | Windows | `PersonalNews_*_x64_pt-BR.msi` | Ambientes gerenciados em português |
            | Linux | `PersonalNews_*_amd64.deb` | Ubuntu, Debian e derivados |
            | macOS | `PersonalNews_*_aarch64.dmg` | Macs com Apple Silicon |

            <details>
            <summary>Outros detalhes de instalação</summary>

            - O instalador EXE é a opção recomendada para a maioria das pessoas no Windows.
            - O MSI em inglês também está disponível entre os arquivos da versão.
            - No macOS, arraste o PersonalNews para a pasta Aplicativos.

            </details>

            ---
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: "--bundles ${{ matrix.bundles }} --verbose"
