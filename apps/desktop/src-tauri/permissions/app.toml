[[permission]]
identifier = "allow-set-window-style"
description = "Permite alterar o estilo da janela"
commands.allow = [
  "set_window_style"
]

[[permission]]
identifier = "allow-open-external-url"
description = "Permite abrir URLs externas"
commands.allow = [
  "open_external_url"
]

[[permission]]
identifier = "allow-get-backend-auth-token"
description = "Permite que a janela principal autentique chamadas ao backend local"
commands.allow = [
  "get_backend_auth_token"
]
