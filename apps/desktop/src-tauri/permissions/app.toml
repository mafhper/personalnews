[[permission]]
identifier = "allow-set-window-style"
description = "Permite alterar o estilo da janela"
commands.allow = [
  "set_window_style"
]

[[permission]]
identifier = "allow-open-external-url"
description = "Permite abrir URLs externas"
commands.allow = [
  "open_external_url"
]

[[permission]]
identifier = "allow-get-backend-auth-token"
description = "Permite que a janela principal autentique chamadas ao backend local"
commands.allow = [
  "get_backend_auth_token"
]

[[permission]]
identifier = "allow-get-backend-status"
description = "Permite que a janela principal leia o status do supervisor do backend local"
commands.allow = [
  "get_backend_status"
]

[[permission]]
identifier = "allow-append-frontend-log"
description = "Permite que a janela principal registre diagnosticos do frontend no log local"
commands.allow = [
  "append_frontend_log"
]

[[permission]]
identifier = "allow-restart-backend-sidecar"
description = "Permite que a janela principal solicite reinicio controlado do backend local"
commands.allow = [
  "restart_backend_sidecar"
]
